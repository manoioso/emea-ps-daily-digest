name: Daily Digest

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print to logs, do not post to Slack)'
        type: boolean
        default: false
      lookback_hours:
        description: 'Lookback window in hours'
        type: string
        default: '24'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '24' }}
        run: python digest.py
